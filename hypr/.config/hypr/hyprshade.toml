# 1. After writing your config, install the systemd timer/service user units and enable the timer unit:
# $ hyprshade install
# $ systemctl --user enable --now hyprshade.timer
#
# 2 .After writing your config, install the systemd timer/service user units and enable the timer unit:

[[shades]]
name = "vibrance"
default = true    # shader to use during times when there is no other shader scheduled

[[shades]]
name = "blue-light-filter"
start_time = 19:00:00
end_time = 06:00:00        # optional if you have more than one shade with start_time
